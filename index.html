<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musky · Mapa PoC — colores custom OSM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --bnw-100: #ffffff;
      --bnw-300: #eaebeb;
      --bnw-500: #cfd1d3;
      --bnw-700: #6c7074;
      --bnw-800: #4e5255;
      --bnw-900: #1e1f1f;
      --pink-200: #fee6f0;
      --pink-600: #f896bf;
      --system-info-100: #e8f3ff;
      --green-areas: #b6f1e0;
      --beige-zones: #ddef9e;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: "Krub", -apple-system, BlinkMacSystemFont, sans-serif; background: #111; }

    #shell {
      position: relative;
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      background: var(--bnw-100);
    }

    #map { width: 100%; height: 100%; }

    body.shot-mode {
      background: var(--bnw-200);
    }
    body.shot-mode #shell {
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
    }
    body.shot-mode .overlay,
    body.shot-mode .hint {
      display: none !important;
    }
    body.shot-mode .maplibregl-ctrl {
      display: none !important;
    }

    .overlay {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
    }
    .overlay > * { pointer-events: auto; }

    .top { padding: 14px 0 0; overflow: visible; }

    .top-header { padding: 0 16px; }

    .row { display: flex; align-items: center; gap: 10px; }
    .row-title { flex: 1; min-width: 0; }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 999px; border: 1px solid var(--bnw-300);
      background: var(--bnw-100); box-shadow: 0 4px 12px rgba(30,31,31,.10);
      display: grid; place-items: center; cursor: pointer; color: var(--bnw-700);
    }

    .title { margin: 0; font-size: 16px; font-weight: 600; color: var(--bnw-700); }
    .subtitle { margin: 2px 0 0; font-size: 13px; font-weight: 400; color: var(--bnw-700); }

    .search-bar {
      padding: 10px 16px 0;
    }
    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-row .search-input {
      flex: 1;
      min-width: 0;
    }
    .locate-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 999px;
      border: 1px solid var(--bnw-300);
      background: var(--bnw-100);
      box-shadow: 0 2px 8px rgba(30,31,31,.06);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--bnw-700);
      font-size: 18px;
      line-height: 1;
    }
    .locate-btn:hover { border-color: var(--pink-600); }
    .locate-btn.active {
      background: var(--pink-200);
      border-color: var(--pink-600);
      color: var(--bnw-900);
    }
    .locate-btn.loading {
      opacity: 0.65;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--bnw-300);
      border-radius: 20px;
      background: var(--bnw-100);
      box-shadow: 0 2px 8px rgba(30,31,31,.06);
      font: 400 14px/20px "Krub", sans-serif;
      color: var(--bnw-900);
    }
    .search-input::placeholder { color: var(--bnw-700); }
    .search-input:focus {
      outline: none;
      border-color: var(--pink-600);
      box-shadow: 0 0 0 2px rgba(248,150,191,.25);
    }

    .chips-scroll {
      margin-top: 12px;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 4px 0 6px;
    }
    .chips-scroll::-webkit-scrollbar { display: none; }

    .chips-track {
      display: inline-flex;
      gap: 8px;
      padding: 0 16px;
    }

    .chip {
      flex: 0 0 auto;
      height: 40px; padding: 4px 16px;
      border-radius: 24px; border: none;
      background: var(--bnw-100);
      box-shadow: 0 2px 8px rgba(30,31,31,.08);
      color: var(--bnw-700);
      font: 600 16px/24px "Krub", sans-serif;
      white-space: nowrap; cursor: pointer;
    }
    .chip.active {
      background: var(--pink-200);
      box-shadow: 0 2px 8px rgba(30,31,31,.08), inset 0 0 0 2px var(--pink-600);
    }

    .chips-loading {
      padding: 0 16px;
      font: 400 13px/20px "Krub", sans-serif;
      color: var(--bnw-700);
    }

    .pin-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2px;
      width: max-content;
      cursor: pointer;
    }
    .pin-wrap.selected .pin-label {
      background: var(--pink-200);
      border-color: var(--pink-600);
      color: var(--bnw-900);
    }
    .pin {
      position: relative;
      width: 54px;
      height: 60px;
      flex-shrink: 0;
    }
    .pin-shape {
      position: absolute;
      left: 10px;
      top: 10px;
      display: block;
      width: 34px;
      height: 40px;
    }
    .pin-icon {
      position: absolute;
      left: 15px;
      top: 14px;
      width: 24px;
      height: 23px;
      border-radius: 12px;
      background: var(--bnw-100);
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }
    .pin-label {
      flex-shrink: 0;
      padding: 4px 8px;
      max-width: 132px;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--bnw-300);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(30,31,31,.10);
      font: 600 11px/14px "Krub", sans-serif;
      color: var(--bnw-800);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .places-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      background: var(--bnw-100);
      border-top: 1px solid var(--bnw-300);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 32px rgba(30,31,31,.12);
      max-height: min(52%, 420px);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .28s ease, max-height .28s ease, height .28s ease;
    }
    .places-drawer.open-list,
    .places-drawer.open-detail { transform: translateY(0); }
    .places-drawer.open-list-full {
      transform: translateY(0);
      max-height: calc(100% - 132px);
      height: calc(100% - 132px);
    }
    .places-drawer.collapsed { pointer-events: none; }
    .places-drawer.empty { pointer-events: none; }
    .places-drawer.dragging {
      transition: none;
    }

    .places-panel-hidden { display: none !important; }

    .places-drawer-handle {
      flex-shrink: 0;
      padding: 10px 0 6px;
      cursor: grab;
      touch-action: none;
    }
    .places-drawer-handle::after {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: var(--bnw-500);
      margin: 0 auto;
    }
    .places-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 16px 8px;
      flex-shrink: 0;
      touch-action: none;
    }
    .places-drawer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .show-map-btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid var(--bnw-300);
      border-radius: 16px;
      background: var(--bnw-100);
      box-shadow: 0 2px 8px rgba(30,31,31,.08);
      font: 600 13px/20px "Krub", sans-serif;
      color: var(--bnw-800);
      cursor: pointer;
    }
    .show-map-btn.hidden { display: none; }
    .places-drawer-title {
      font: 600 16px/24px "Krub", sans-serif;
      color: var(--bnw-900);
    }
    .places-drawer-count {
      font: 600 13px/20px "Krub", sans-serif;
      color: var(--bnw-700);
      background: var(--pink-200);
      padding: 2px 10px;
      border-radius: 999px;
    }
    .places-drawer-hint {
      padding: 0 16px 12px;
      font: 400 13px/20px "Krub", sans-serif;
      color: var(--bnw-700);
    }
    .places-list {
      list-style: none;
      margin: 0;
      padding: 0 8px 12px;
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .places-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 8px;
      border: none;
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }
    .places-list-item:hover,
    .places-list-item.active {
      background: var(--pink-200);
    }
    .places-list-body { min-width: 0; flex: 1; }
    .places-list-name {
      font: 600 14px/20px "Krub", sans-serif;
      color: var(--bnw-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .places-list-meta {
      font: 400 12px/16px "Krub", sans-serif;
      color: var(--bnw-700);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #places-detail-panel {
      overflow-y: auto;
      flex: 1;
      padding: 0 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .show-list-btn {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 6;
      height: 44px;
      padding: 0 18px;
      border: 1px solid var(--bnw-300);
      border-radius: 22px;
      background: var(--bnw-100);
      box-shadow: 0 4px 16px rgba(30,31,31,.14);
      font: 600 15px/20px "Krub", sans-serif;
      color: var(--bnw-800);
      cursor: pointer;
    }
    .show-list-btn.hidden { display: none; }

    .share-toast {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(30,31,31,.92);
      color: #fff;
      font: 400 13px/18px "Krub", sans-serif;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .share-toast.visible { opacity: 1; }

    .place-detail {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .place-modal-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .place-modal-emoji {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      background: var(--pink-200);
      display: grid;
      place-items: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .place-modal-head { min-width: 0; flex: 1; }
    .place-modal-name {
      margin: 0;
      font: 600 18px/24px "Krub", sans-serif;
      color: var(--bnw-900);
    }
    .place-modal-category {
      margin: 2px 0 0;
      font: 400 13px/20px "Krub", sans-serif;
      color: var(--bnw-700);
    }
    .place-modal-close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--bnw-300);
      border-radius: 999px;
      background: var(--bnw-100);
      color: var(--bnw-700);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .place-modal-info {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .place-info-row {
      display: grid;
      gap: 2px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--bnw-300);
    }
    .place-info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .place-info-label {
      font: 600 11px/16px "Krub", sans-serif;
      color: var(--bnw-700);
      text-transform: uppercase;
      letter-spacing: .02em;
    }
    .place-info-value {
      font: 400 14px/20px "Krub", sans-serif;
      color: var(--bnw-900);
      word-break: break-word;
    }
    .place-info-value a { color: var(--bnw-800); }
    .place-modal-actions { display: grid; gap: 8px; }
    .place-modal-btn {
      height: 44px;
      border: none;
      border-radius: 22px;
      font: 600 16px/24px "Krub", sans-serif;
      cursor: pointer;
    }
    .place-modal-btn.primary {
      background: var(--pink-600);
      color: var(--bnw-100);
    }
    .place-modal-btn.secondary {
      background: var(--bnw-100);
      color: var(--bnw-800);
      border: 1px solid var(--bnw-300);
    }
    .place-modal-empty {
      font: 400 13px/20px "Krub", sans-serif;
      color: var(--bnw-700);
      margin: 0 0 12px;
    }

    .hint {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(30,31,31,.88); color: #fff; padding: 8px 14px;
      border-radius: 999px; font: 400 12px/16px "Krub", sans-serif; z-index: 99;
    }

    .maplibregl-marker {
      width: auto !important;
      height: auto !important;
      overflow: visible !important;
    }
    .maplibregl-marker > * {
      width: auto;
      height: auto;
    }

    .user-location-marker {
      width: 24px;
      height: 24px;
      position: relative;
      pointer-events: none;
    }
    .user-location-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin: -7px 0 0 -7px;
      background: #4285f4;
      border: 3px solid var(--bnw-100);
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(30,31,31,.25);
      z-index: 2;
    }
    .user-location-pulse {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      margin: -12px 0 0 -12px;
      background: rgba(66,133,244,.28);
      border-radius: 50%;
      animation: user-pulse 2s ease-out infinite;
    }
    @keyframes user-pulse {
      0% { transform: scale(0.55); opacity: 1; }
      100% { transform: scale(1.85); opacity: 0; }
    }

    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-attrib a,
    .maplibregl-popup-content {
      font-family: "Krub", sans-serif !important;
      color: var(--bnw-700) !important;
    }
    .maplibregl-ctrl-attrib { font-size: 10px !important; }
  </style>
</head>
<body>
  <div id="shell">
    <div id="map"></div>
    <div class="overlay">
      <div class="top">
        <div class="top-header">
          <div class="row">
            <button class="icon-btn" aria-label="Atrás">←</button>
            <div class="row-title">
              <h1 class="title">Mapa Musky</h1>
              <p class="subtitle">Prueba · mapa personalizado OpenStreetMap</p>
            </div>
            <button class="icon-btn" id="share-btn" aria-label="Compartir mapa" title="Compartir enlace">⤴</button>
          </div>
        </div>
        <div class="share-toast" id="share-toast" role="status"></div>
        <div class="search-bar">
          <div class="search-row">
            <input
              type="search"
              id="places-search"
              class="search-input"
              placeholder="Buscar… pipicans, parques, fuentes"
              autocomplete="off"
            />
            <button
              type="button"
              class="locate-btn"
              id="locate-btn"
              aria-label="Usar mi ubicación"
              title="Buscar lugares cerca de mí"
            >◎</button>
          </div>
        </div>
        <div class="chips-scroll">
          <div class="chips-track" id="chips"></div>
        </div>
      </div>
      <button type="button" class="show-list-btn hidden" id="show-list-btn">Ver lista</button>
      <div class="places-drawer collapsed empty" id="places-drawer">
        <div class="places-drawer-handle" id="places-drawer-handle"></div>
        <div id="places-list-panel">
          <div class="places-drawer-header">
            <span class="places-drawer-title" id="places-drawer-title">Lugares</span>
            <div class="places-drawer-actions">
              <button type="button" class="show-map-btn hidden" id="show-map-btn">Ver mapa</button>
              <span class="places-drawer-count" id="places-count"></span>
            </div>
          </div>
          <p class="places-drawer-hint" id="places-drawer-hint">Elige una categoría para ver la lista</p>
          <ul class="places-list" id="places-list"></ul>
        </div>
        <div id="places-detail-panel" class="places-panel-hidden"></div>
      </div>
    </div>
  </div>
  <div class="hint">Compartir ⤴ · el enlace guarda categoría, búsqueda y posición del mapa</div>

  <script src="osm-places-bcn.js"></script>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script>
    const isScreenshotMode = new URLSearchParams(window.location.search).get('shot') === '1';

    function applyScreenshotMode() {
      if (!isScreenshotMode) return;
      document.body.classList.add('shot-mode');
      document.getElementById('shell')?.classList.add('shot-mode');
    }
    applyScreenshotMode();

    const COLORS = {
      vias: '#CFD1D3',       // bnw/500
      fondo: '#FAFAFA',      // bnw/200
      areasVerdes: '#B6F1E0',
      zonasBeige: '#DDEF9E',
      zonas: '#FEE6F0',      // pink/200
      mar: '#E8F3FF',        // systemInfo/100
      edificios: '#FFF3E3',  // yellow/100
      text: '#6C7074',       // bnw/700
    };

    // Edificios visibles ~2 niveles antes que escala 50 m (~zoom 15.75)
    const BUILDING_MIN_ZOOM = (() => {
      const lat = 40.4;
      const meters = 50;
      const metersPerPixel = meters / 100;
      const z = Math.log2(
        156543.03392 * Math.cos(lat * Math.PI / 180) / metersPerPixel,
      );
      return Math.max(15, Math.floor(z * 4) / 4 - 2);
    })();

    const MAP_FONT = ['Krub'];

    // Bordes/contornos de calzada (línea doble junto a cada vía)
    const EXTRA_NOISE_LAYERS = [
      'road_major_rail_hatching',
      'road_transit_rail_hatching',
      'road_one_way_arrow',
      'road_one_way_arrow_opposite',
    ];

    const chips = [
      { id: 'park', label: '🌳  Parques' },
      { id: 'dog', label: '🐶  Parque para perros' },
      { id: 'vet', label: '🏥  Veterinarios' },
      { id: 'fountain', label: '⛲  Fuentes de agua' },
      { id: 'beach', label: '🏖️  Playa de perros' },
    ];

    const CATEGORY_SEARCH_ALIASES = {
      park: ['parque', 'parques', 'jardín', 'jardin'],
      dog: ['pipican', 'pipicans', 'parque para perros', 'parque perros', 'parque de perros', 'gossos', 'correcan', 'correcà', 'area gossos'],
      vet: ['veterinario', 'veterinarios', 'veterinaria', 'clínica veterinaria', 'clinica veterinaria'],
      fountain: ['fuente', 'fuentes', 'agua', 'bebedero', 'bebederos'],
      beach: ['playa', 'playa perros', 'playa de perros'],
    };

    const PLACE_EMOJI = {
      park: '🌳',
      dog: '🐶',
      fountain: '⛲',
      vet: '🏥',
      beach: '🏖️',
    };

    const DEFAULT_PLACE_NAME = {
      park: 'Parque',
      dog: 'Parque para perros',
      fountain: 'Fuente de agua',
      vet: 'Veterinario',
      beach: 'Playa de perros',
    };

    const CATEGORY_LABEL = {
      park: 'Parque',
      dog: 'Parque para perros',
      fountain: 'Fuente de agua',
      vet: 'Veterinario',
      beach: 'Playa de perros',
    };

    const OVERPASS_URL = 'https://overpass-api.de/api/interpreter';
    const SPAIN_BBOX = { south: 27.5, west: -18.5, north: 43.9, east: 4.6 };
    const DEFAULT_MAP = { lat: 40.4168, lng: -3.7038, zoom: 6 };
    const MIN_POI_ZOOM = 10;
    const USER_RADIUS_KM = 25;

    function buildOverpassQuery(south, west, north, east) {
      return `[out:json][timeout:25];
(
  node["leisure"="dog_park"](${south},${west},${north},${east});
  way["leisure"="dog_park"](${south},${west},${north},${east});
  node["amenity"="drinking_water"](${south},${west},${north},${east});
  node["amenity"="veterinary"](${south},${west},${north},${east});
  node["leisure"="park"](${south},${west},${north},${east});
  way["leisure"="park"](${south},${west},${north},${east});
  node["leisure"="beach"]["dog"="yes"](${south},${west},${north},${east});
  way["leisure"="beach"]["dog"="yes"](${south},${west},${north},${east});
);
out center;`;
    }

    const OSM_POI_LAYERS = ['poi_r1', 'poi_r7', 'poi_r20'];
    const VALID_FILTERS = new Set(['park', 'dog', 'vet', 'fountain', 'beach']);

    const initialUrlState = parseUrlState();
    let urlSyncSuspended = false;
    let urlSyncTimer = null;

    // Respaldo mínimo si Overpass no responde (varias ciudades de España).
    const FALLBACK_OSM_ELEMENTS = [
      { id: 1, lat: 41.4065, lon: 2.1478, tags: { leisure: 'park', 'name:es': 'Parc del Putxet i el Farró' } },
      { id: 2, lat: 40.4153, lon: -3.6844, tags: { leisure: 'park', name: 'Parque del Retiro' } },
      { id: 3, lat: 39.4699, lon: -0.3763, tags: { leisure: 'park', name: 'Jardines del Turia' } },
      { id: 4, lat: 37.3826, lon: -5.9963, tags: { leisure: 'dog_park', name: 'Parque canino Sevilla' } },
      { id: 5, lat: 43.2630, lon: -2.9350, tags: { amenity: 'drinking_water', name: 'Fuente Bilbao' } },
      { id: 6, lat: 28.4682, lon: -16.2546, tags: { leisure: 'beach', dog: 'yes', name: 'Playa canina Tenerife' } },
    ];

    let muskyPlaces = [];
    let placesById = new Map();
    let fetchedBboxKeys = new Set();
    let placesFetchTimer = null;
    let placesFetchRequest = 0;
    let placesLoading = false;
    let selectedPlaceId = null;
    let placesDrawerOpen = false;
    let placeDetailOpen = false;
    let drawerFullScreen = false;
    let placeSearchQuery = '';

    let activeFilter = null;
    const markers = [];
    let map;
    let userLocation = null;
    let userLocationMarker = null;

    async function loadKrubFonts() {
      await Promise.all([
        document.fonts.load('400 12px "Krub"'),
        document.fonts.load('600 16px "Krub"'),
      ]);
      await document.fonts.ready;
    }

    async function initMap() {
      await loadKrubFonts();

      map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        transformStyle: (_previous, next) => {
          delete next.glyphs;
          return next;
        },
        center: [
          Number.isFinite(initialUrlState.lng) ? initialUrlState.lng : DEFAULT_MAP.lng,
          Number.isFinite(initialUrlState.lat) ? initialUrlState.lat : DEFAULT_MAP.lat,
        ],
        zoom: Number.isFinite(initialUrlState.z) ? initialUrlState.z : DEFAULT_MAP.zoom,
        pitch: 0,
        bearing: 0,
        maxPitch: 0,
        attributionControl: !isScreenshotMode,
      });

      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();
      if (map.touchPitch) map.touchPitch.disable();

      if (!isScreenshotMode) {
        map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');
      }

      map.on('moveend', () => {
        if (isScreenshotMode) {
          scheduleUrlSync();
          return;
        }
        if (hasActivePlaceView() && !placesLoading) renderPlacesList();
        schedulePlacesFetch();
        scheduleUrlSync();
      });

      if (!isScreenshotMode) {
        map.on('click', () => {
          if (!hasActivePlaceView()) return;
          if (placesDrawerOpen || placeDetailOpen) collapseDrawer();
        });
      }

      map.on('load', async () => {
        applyMuskyColors();
        applySpanishLabels();
        applyMapTypography();
        applyTransitFilters();
        hideOsmPoiLayers();
        applyRoadCasingsVisibility(false);
        applyExtraNoiseVisibility(false);
        applyPedestrianPathFilters(false);
        if (isScreenshotMode) {
          scheduleUrlSync();
          return;
        }
        renderChips();
        await bootstrapPlacesData();
        applyUrlState(initialUrlState);
        if (hasActivePlaceView()) schedulePlacesFetch(true);
        renderChips();
        renderMarkers();
        renderPlacesList();
        setupPlacesDrawer();
        setupSearch();
        setupShare();
        setupLocate();
        scheduleUrlSync();
      });
    }

    function parseUrlState() {
      const p = new URLSearchParams(window.location.search);
      const view = p.get('view');
      return {
        filter: VALID_FILTERS.has(p.get('f')) ? p.get('f') : null,
        q: p.get('q') || '',
        lat: parseFloat(p.get('lat')),
        lng: parseFloat(p.get('lng')),
        z: parseFloat(p.get('z')),
        place: p.get('place') || null,
        view: view === 'list' || view === 'detail' || view === 'map' || view === 'list-full' ? view : null,
        ulat: parseFloat(p.get('ulat')),
        ulng: parseFloat(p.get('ulng')),
      };
    }

    function buildShareUrl() {
      if (!map) return window.location.href;
      const c = map.getCenter();
      const p = new URLSearchParams();
      if (isScreenshotMode) p.set('shot', '1');
      if (activeFilter) p.set('f', activeFilter);
      if (placeSearchQuery.trim()) p.set('q', placeSearchQuery.trim());
      p.set('lat', c.lat.toFixed(5));
      p.set('lng', c.lng.toFixed(5));
      p.set('z', map.getZoom().toFixed(2));
      if (selectedPlaceId) p.set('place', selectedPlaceId);
      if (userLocation) {
        p.set('ulat', userLocation.lat.toFixed(5));
        p.set('ulng', userLocation.lng.toFixed(5));
      }
      if (placeDetailOpen) p.set('view', 'detail');
      else if (placesDrawerOpen && drawerFullScreen) p.set('view', 'list-full');
      else if (placesDrawerOpen) p.set('view', 'list');
      else if (hasActivePlaceView()) p.set('view', 'map');
      const qs = p.toString();
      return `${window.location.origin}${window.location.pathname}${qs ? `?${qs}` : ''}`;
    }

    function scheduleUrlSync() {
      if (urlSyncSuspended || !map) return;
      clearTimeout(urlSyncTimer);
      urlSyncTimer = setTimeout(() => {
        history.replaceState(null, '', buildShareUrl());
      }, 200);
    }

    function applyUrlState(state) {
      urlSyncSuspended = true;

      if (state.filter) activeFilter = state.filter;
      if (state.q) {
        placeSearchQuery = state.q;
        const searchEl = document.getElementById('places-search');
        if (searchEl) searchEl.value = state.q;
      }

      placeDetailOpen = false;
      placesDrawerOpen = false;
      drawerFullScreen = false;

      if (state.view === 'list' || state.view === 'list-full') placesDrawerOpen = true;
      if (state.view === 'list-full') drawerFullScreen = true;
      if (state.place) {
        const place = muskyPlaces.find(item => item.id === state.place);
        if (place) {
          selectedPlaceId = place.id;
          if (state.view === 'detail') {
            placeDetailOpen = true;
            renderPlaceDetail(place);
          }
        }
      }

      if (Number.isFinite(state.ulat) && Number.isFinite(state.ulng)) {
        setUserLocation(state.ulat, state.ulng, false);
      }

      urlSyncSuspended = false;
    }

    let shareToastTimer = null;
    function showShareToast(message) {
      const toast = document.getElementById('share-toast');
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(shareToastTimer);
      shareToastTimer = setTimeout(() => toast.classList.remove('visible'), 3200);
    }

    async function shareMapLink() {
      const url = buildShareUrl();

      if (window.location.protocol === 'file:') {
        showShareToast('Para compartir, publica docs/map-poc en Netlify o GitHub Pages.');
        return;
      }

      try {
        if (navigator.share) {
          await navigator.share({ title: 'Mapa Musky', text: 'Mapa Musky · España', url });
          return;
        }
      } catch (err) {
        if (err?.name === 'AbortError') return;
      }

      try {
        await navigator.clipboard.writeText(url);
        showShareToast('Enlace copiado al portapapeles');
      } catch (_) {
        showShareToast(url);
      }
    }

    function setupShare() {
      document.getElementById('share-btn').onclick = shareMapLink;
    }

    function updateLocateButton() {
      const btn = document.getElementById('locate-btn');
      if (!btn) return;
      btn.classList.toggle('active', Boolean(userLocation));
      btn.classList.remove('loading');
    }

    function renderUserLocationMarker() {
      if (userLocationMarker) {
        userLocationMarker.remove();
        userLocationMarker = null;
      }
      if (!map || !userLocation) return;

      const el = document.createElement('div');
      el.className = 'user-location-marker';
      el.innerHTML = '<span class="user-location-pulse"></span><span class="user-location-dot"></span>';
      userLocationMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([userLocation.lng, userLocation.lat])
        .addTo(map);
    }

    function setUserLocation(lat, lng, fly = true) {
      userLocation = { lat, lng };
      updateLocateButton();
      renderUserLocationMarker();

      if (fly && map) {
        map.flyTo({
          center: [lng, lat],
          zoom: Math.max(map.getZoom(), 14.2),
          duration: 900,
        });
      }

      if (hasActivePlaceView()) schedulePlacesFetch(true);
      renderMarkers();
      renderPlacesList();
      if (placeDetailOpen && selectedPlaceId) {
        const place = muskyPlaces.find(item => item.id === selectedPlaceId);
        if (place) renderPlaceDetail(place);
      }
      scheduleUrlSync();
    }

    function requestUserLocation() {
      if (!navigator.geolocation) {
        showShareToast('Tu navegador no soporta geolocalización');
        return;
      }

      const btn = document.getElementById('locate-btn');
      btn.classList.add('loading');
      showShareToast('Obteniendo tu ubicación…');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setUserLocation(pos.coords.latitude, pos.coords.longitude, true);
          showShareToast('Mostrando lugares cerca de ti');
        },
        (err) => {
          updateLocateButton();
          const messages = {
            1: 'Permiso de ubicación denegado',
            2: 'Ubicación no disponible',
            3: 'Tiempo agotado al obtener ubicación',
          };
          showShareToast(messages[err.code] || 'No se pudo obtener tu ubicación');
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 },
      );
    }

    function setupLocate() {
      document.getElementById('locate-btn').onclick = requestUserLocation;
      updateLocateButton();
    }

    function applyMuskyColors() {
      const setFill = (id, color) => { if (map.getLayer(id)) map.setPaintProperty(id, 'fill-color', color); };
      const setLine = (id, color) => { if (map.getLayer(id)) map.setPaintProperty(id, 'line-color', color); };
      const setBg = (id, color) => { if (map.getLayer(id)) map.setPaintProperty(id, 'background-color', color); };

      setBg('background', COLORS.fondo);
      if (map.getLayer('natural_earth')) map.setPaintProperty('natural_earth', 'raster-opacity', 0);

      setFill('water', COLORS.mar);
      ['waterway_river', 'waterway_other', 'waterway_tunnel'].forEach(id => setLine(id, COLORS.mar));

      ['park', 'landcover_grass', 'landcover_wood', 'landuse_pitch', 'landuse_track'].forEach(id => setFill(id, COLORS.areasVerdes));
      if (map.getLayer('park_outline')) setLine('park_outline', COLORS.areasVerdes);

      ['landuse_residential', 'landcover_sand', 'landuse_school', 'landuse_cemetery'].forEach(id => setFill(id, COLORS.zonasBeige));
      setFill('building', COLORS.edificios);
      applyBuildingStyle();

      // Mapa 2D: ocultar extrusión 3D de edificios
      if (map.getLayer('building-3d')) {
        map.setLayoutProperty('building-3d', 'visibility', 'none');
      }

      const roads = [
        'road_motorway', 'road_motorway_link', 'road_trunk_primary', 'road_secondary_tertiary',
        'road_minor', 'road_link', 'road_service_track',
      ];
      roads.forEach(id => setLine(id, COLORS.vias));

      applyRoadWidths();
    }

    function applyBuildingStyle() {
      if (!map.getLayer('building')) return;
      map.setLayerZoomRange('building', BUILDING_MIN_ZOOM, 24);
      map.setPaintProperty('building', 'fill-color', COLORS.edificios);
      map.setPaintProperty('building', 'fill-outline-color', COLORS.edificios);
    }

    // Aceras urbanas OSM (subclass). No incluir footway: en parques los senderos suelen ser footway.
    const STREET_SIDEWALK_SUBCLASSES = ['sidewalk', 'crossing', 'steps'];
    const PEDESTRIAN_PATH_LAYERS = [
      { id: 'road_path_pedestrian', surface: true },
      { id: 'tunnel_path_pedestrian', brunnel: 'tunnel' },
      { id: 'bridge_path_pedestrian', brunnel: 'bridge' },
    ];

    function parkPathFilter(brunnel) {
      const base = [
        ['match', ['geometry-type'], ['LineString', 'MultiLineString'], true, false],
        ['==', ['get', 'class'], 'path'],
        ['!', ['in', ['get', 'subclass'], ['literal', STREET_SIDEWALK_SUBCLASSES]]],
      ];
      if (brunnel === true) {
        return ['all', ...base, ['match', ['get', 'brunnel'], ['bridge', 'tunnel'], false, true]];
      }
      return ['all', ...base, ['==', ['get', 'brunnel'], brunnel]];
    }

    function allPedestrianPathFilter(brunnel) {
      const base = [
        ['match', ['geometry-type'], ['LineString', 'MultiLineString'], true, false],
        ['match', ['get', 'class'], ['path', 'pedestrian'], true, false],
      ];
      if (brunnel === true) {
        return ['all', ...base, ['match', ['get', 'brunnel'], ['bridge', 'tunnel'], false, true]];
      }
      return ['all', ...base, ['==', ['get', 'brunnel'], brunnel]];
    }

    function applyPedestrianPathFilters(showSidewalks) {
      const filterFor = showSidewalks ? allPedestrianPathFilter : parkPathFilter;

      PEDESTRIAN_PATH_LAYERS.forEach(({ id, surface, brunnel }) => {
        if (!map.getLayer(id)) return;
        map.setFilter(id, filterFor(surface ? true : brunnel));
        map.setPaintProperty(id, 'line-color', COLORS.vias);
        map.setPaintProperty(id, 'line-dasharray', [1, 0]);
      });

      if (map.getLayer('bridge_path_pedestrian_casing')) {
        map.setLayoutProperty(
          'bridge_path_pedestrian_casing',
          'visibility',
          showSidewalks ? 'visible' : 'none',
        );
      }

      if (map.getLayer('highway-name-path')) {
        map.setFilter(
          'highway-name-path',
          showSidewalks
            ? ['==', ['get', 'class'], 'path']
            : ['all',
              ['==', ['get', 'class'], 'path'],
              ['!', ['in', ['get', 'subclass'], ['literal', STREET_SIDEWALK_SUBCLASSES]]],
            ],
        );
      }
    }

    function roadWidthExpr(stops) {
      return ['interpolate', ['exponential', 1.2], ['zoom'], ...stops];
    }

    function railWidthExpr(stops) {
      return ['interpolate', ['exponential', 1.4], ['zoom'], ...stops];
    }

    function scaleRoadStops(stops, factor = 0.775) {
      const scaled = [];
      for (let i = 0; i < stops.length; i += 2) {
        scaled.push(stops[i], +(stops[i + 1] * factor).toFixed(2));
      }
      return scaled;
    }

    // Punto medio entre Liberty (100%) y el ajuste fino anterior (~55%) → ~77.5%
    function applyRoadWidths() {
      const factor = 0.775;
      const widths = {
        major: roadWidthExpr(scaleRoadStops([5, 0, 7, 1, 20, 18], factor)),
        secondary: roadWidthExpr(scaleRoadStops([6.5, 0, 8, 0.5, 20, 13], factor)),
        minor: roadWidthExpr(scaleRoadStops([13.5, 0, 14, 2.5, 20, 18], factor)),
        link: roadWidthExpr(scaleRoadStops([12.5, 0, 13, 1.5, 14, 2.5, 20, 11.5], factor)),
        service: roadWidthExpr(scaleRoadStops([15.5, 0, 16, 2, 20, 7.5], factor)),
        path: roadWidthExpr(scaleRoadStops([14, 1, 20, 10], factor)),
        rail: railWidthExpr(scaleRoadStops([14, 0.4, 15, 0.75, 20, 2], factor)),
      };

      const layerWidth = [
        ['motorway_link', 'link'], ['path_pedestrian', 'path'],
        ['secondary_tertiary', 'secondary'], ['service_track', 'service'],
        ['trunk_primary', 'major'], ['motorway', 'major'], ['minor', 'minor'],
        ['_link', 'link'], ['major_rail', 'rail'], ['transit_rail', 'rail'],
      ];

      for (const layer of map.getStyle().layers) {
        if (layer.type !== 'line') continue;
        const match = layerWidth.find(([key]) => layer.id.includes(key));
        if (!match) continue;
        if (layer.id.includes('casing') || layer.id.includes('hatching') || layer.id.includes('arrow')) continue;
        map.setPaintProperty(layer.id, 'line-width', widths[match[1]]);
      }
    }

    function getRoadCasingLayers() {
      return map.getStyle().layers
        .filter(l => l.type === 'line' && l.id.includes('casing'))
        .map(l => l.id);
    }

    function applyRoadCasingsVisibility(visible) {
      getRoadCasingLayers().forEach(id => {
        map.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
        if (visible) {
          map.setPaintProperty(id, 'line-color', COLORS.fondo);
        }
      });
    }

    function applyExtraNoiseVisibility(visible) {
      EXTRA_NOISE_LAYERS.forEach(id => {
        if (!map.getLayer(id)) return;
        map.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
      });
    }

    // Etiquetas del mapa en castellano (prioriza name:es de OSM).
    const SPANISH_NAME = ['coalesce', ['get', 'name:es'], ['get', 'name'], ['get', 'name:latin'], ''];

    function applySpanishLabels() {
      for (const layer of map.getStyle().layers) {
        if (layer.type !== 'symbol') continue;
        const layout = layer.layout || {};
        if (!layout['text-field']) continue;

        const id = layer.id;
        // Escudos de carretera usan ref, no nombre
        if (/shield|ref|hatching/i.test(id)) continue;

        try {
          map.setLayoutProperty(id, 'text-field', SPANISH_NAME);
        } catch (_) { /* expresión no compatible */ }
      }
    }

    function applyMapTypography() {
      for (const layer of map.getStyle().layers) {
        if (layer.type !== 'symbol') continue;
        const layout = layer.layout || {};
        if (!layout['text-field']) continue;

        const id = layer.id;
        try {
          map.setPaintProperty(id, 'text-color', COLORS.text);
          map.setPaintProperty(id, 'text-halo-color', COLORS.fondo);
          map.setPaintProperty(id, 'text-halo-width', 1.2);
          map.setLayoutProperty(id, 'text-font', MAP_FONT);
        } catch (_) { /* capa sin text paint */ }
      }
    }

    function applyTransitFilters() {
      // Solo metro/tren (class=rail). Sin bus ni aeropuertos.
      if (map.getLayer('poi_transit')) {
        map.setFilter('poi_transit', ['==', ['get', 'class'], 'rail']);
      }
    }

    function classifyOsmElement(tags) {
      if (tags.leisure === 'dog_park') return 'dog';
      if (tags.amenity === 'drinking_water') return 'fountain';
      if (tags.amenity === 'veterinary') return 'vet';
      if (tags.leisure === 'park') return 'park';
      if (tags.leisure === 'beach' && (tags.dog === 'yes' || tags.dog === 'designated')) return 'beach';
      return null;
    }

    function extractPlaceName(tags, type) {
      const osmName = (tags['name:es'] || tags.name || tags['name:ca'] || '').trim();
      return {
        name: osmName || DEFAULT_PLACE_NAME[type],
        hasCustomName: Boolean(osmName),
      };
    }

    function buildPlaceInfo(tags, type) {
      const rows = [];
      const add = (label, value) => {
        if (value == null) return;
        const text = String(value).trim();
        if (!text) return;
        rows.push({ label, value: text });
      };

      const address = tags['addr:full']
        || [tags['addr:street'], tags['addr:housenumber']].filter(Boolean).join(' ')
        || tags['addr:place'];
      add('Dirección', address);
      add('Horario', tags.opening_hours);
      add('Teléfono', tags.phone || tags['contact:phone']);
      add('Web', tags.website || tags['contact:website']);
      add('Operador', tags.operator);
      add('Acceso', tags.access);
      if (tags.fee === 'no') add('Gratuito', 'Sí');
      else if (tags.fee === 'yes') add('De pago', 'Sí');
      else add('Tarifa', tags.fee);

      if (type === 'fountain') {
        if (tags.bottle === 'yes') add('Agua embotellada', 'Sí');
        add('Referencia', tags.ref);
        add('Tipo', tags.man_made);
      }
      if (type === 'dog' || type === 'beach') add('Perros', tags.dog);
      if (type === 'vet') {
        add('Urgencias', tags.emergency);
        add('Cita previa', tags['appointment']);
      }
      add('Descripción', tags.description);
      add('Wikipedia', tags.wikipedia);
      return rows;
    }

    function parseOsmElements(elements) {
      const places = [];
      const seen = new Set();
      for (const el of elements || []) {
        const tags = el.tags || {};
        const type = classifyOsmElement(tags);
        if (!type) continue;
        const lat = el.lat ?? el.center?.lat;
        const lng = el.lon ?? el.center?.lon;
        if (lat == null || lng == null) continue;
        const key = `${type}:${lng.toFixed(5)},${lat.toFixed(5)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const { name, hasCustomName } = extractPlaceName(tags, type);
        places.push({
          id: `${type}-${el.id}`,
          type,
          emoji: PLACE_EMOJI[type],
          name,
          hasCustomName,
          categoryLabel: CATEGORY_LABEL[type],
          lng,
          lat,
          info: buildPlaceInfo(tags, type),
          osmId: el.id,
        });
      }
      return places;
    }

    function getMapCenter() {
      const c = map.getCenter();
      return { lat: c.lat, lng: c.lng };
    }

    function getDistanceOrigin() {
      return userLocation || getMapCenter();
    }

    function distanceKm(from, to) {
      const r = 6371;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(from.lat * Math.PI / 180) * Math.cos(to.lat * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(km) {
      if (km < 1) return `${Math.round(km * 1000)} m`;
      return `${km.toFixed(1).replace('.', ',')} km`;
    }

    function normalizeSearch(text) {
      return text.trim().toLowerCase().normalize('NFD').replace(/\p{M}/gu, '');
    }

    function resolveSearchCategory(query) {
      const q = normalizeSearch(query);
      if (!q) return null;
      for (const [id, aliases] of Object.entries(CATEGORY_SEARCH_ALIASES)) {
        if (aliases.some(a => q === a || q.includes(a) || a.includes(q))) return id;
      }
      return null;
    }

    function matchesSearch(place, query) {
      const q = normalizeSearch(query);
      if (!q) return true;
      if (CATEGORY_SEARCH_ALIASES[place.type]?.some(a => q === a || q.includes(a) || a.includes(q))) {
        return true;
      }
      const haystack = normalizeSearch(`${place.name} ${place.categoryLabel}`);
      return haystack.includes(q);
    }

    function getVisiblePlaces() {
      const origin = getDistanceOrigin();
      const q = placeSearchQuery.trim();
      const categoryFromSearch = q ? resolveSearchCategory(q) : null;
      const filterType = activeFilter || categoryFromSearch;

      if (!filterType && !q) return [];

      let pool = filterType
        ? muskyPlaces.filter(p => p.type === filterType)
        : muskyPlaces;

      if (q) pool = pool.filter(p => matchesSearch(p, q));

      if (userLocation) {
        pool = pool.filter(p => distanceKm(userLocation, p) <= USER_RADIUS_KM);
      }
      const bounds = getViewportBounds(0.2);
      pool = pool.filter(p => isPlaceInBounds(p, bounds));

      return pool
        .map(p => ({ ...p, distanceKm: distanceKm(origin, p) }))
        .sort((a, b) => a.distanceKm - b.distanceKm);
    }

    function hasActivePlaceView() {
      return Boolean(activeFilter || placeSearchQuery.trim());
    }

    function getViewportBounds(paddingRatio = 0.12) {
      const b = map.getBounds();
      const latPad = (b.getNorth() - b.getSouth()) * paddingRatio;
      const lngPad = (b.getEast() - b.getWest()) * paddingRatio;
      return {
        south: Math.max(SPAIN_BBOX.south, b.getSouth() - latPad),
        north: Math.min(SPAIN_BBOX.north, b.getNorth() + latPad),
        west: Math.max(SPAIN_BBOX.west, b.getWest() - lngPad),
        east: Math.min(SPAIN_BBOX.east, b.getEast() + lngPad),
      };
    }

    function bboxCacheKey(bounds) {
      const round = v => Math.round(v * 100) / 100;
      return `${round(bounds.south)},${round(bounds.west)},${round(bounds.north)},${round(bounds.east)}`;
    }

    function mergePlaces(places) {
      for (const place of places) {
        placesById.set(place.id, place);
      }
      muskyPlaces = Array.from(placesById.values());
    }

    async function fetchOverpassForBounds(bounds) {
      const query = buildOverpassQuery(bounds.south, bounds.west, bounds.north, bounds.east);
      const resp = await fetch(OVERPASS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ data: query }),
      });
      if (!resp.ok) throw new Error(`Overpass ${resp.status}`);
      return resp.json();
    }

    async function bootstrapPlacesData() {
      if (window.OSM_PLACES_DATA?.elements?.length) {
        mergePlaces(parseOsmElements(window.OSM_PLACES_DATA.elements));
        return;
      }

      try {
        const resp = await fetch('osm-places-bcn.json');
        if (resp.ok) {
          const data = await resp.json();
          mergePlaces(parseOsmElements(data.elements));
        }
      } catch (_) { /* file:// o sin servidor local */ }

      try {
        const resp = await fetch('osm-places-es.js', { method: 'HEAD' });
        if (resp.ok) {
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'osm-places-es.js';
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
          if (window.OSM_PLACES_DATA?.elements?.length) {
            mergePlaces(parseOsmElements(window.OSM_PLACES_DATA.elements));
            return;
          }
        }
      } catch (_) { /* sin bundle estático */ }

      try {
        const resp = await fetch('osm-places-es.json');
        if (resp.ok) {
          const data = await resp.json();
          mergePlaces(parseOsmElements(data.elements));
          return;
        }
      } catch (_) { /* file:// o sin servidor local */ }
    }

    function schedulePlacesFetch(immediate = false) {
      if (!map || !hasActivePlaceView()) return;
      clearTimeout(placesFetchTimer);
      placesFetchTimer = setTimeout(() => refreshPlacesForViewport(), immediate ? 0 : 450);
    }

    async function refreshPlacesForViewport() {
      if (!map || !hasActivePlaceView()) return;

      if (map.getZoom() < MIN_POI_ZOOM) {
        renderPlacesList();
        renderMarkers();
        return;
      }

      const bounds = getViewportBounds();
      const key = bboxCacheKey(bounds);
      if (fetchedBboxKeys.has(key)) {
        renderPlacesList();
        renderMarkers();
        return;
      }

      const requestId = ++placesFetchRequest;
      placesLoading = true;
      renderPlacesList();

      try {
        const data = await fetchOverpassForBounds(bounds);
        if (requestId !== placesFetchRequest) return;
        mergePlaces(parseOsmElements(data.elements));
        fetchedBboxKeys.add(key);
      } catch (_) {
        if (requestId !== placesFetchRequest) return;
        if (!muskyPlaces.length) {
          mergePlaces(parseOsmElements(FALLBACK_OSM_ELEMENTS));
        }
      } finally {
        if (requestId === placesFetchRequest) {
          placesLoading = false;
          renderMarkers();
          renderPlacesList();
        }
      }
    }

    function isPlaceInBounds(place, bounds) {
      return place.lat >= bounds.south && place.lat <= bounds.north
        && place.lng >= bounds.west && place.lng <= bounds.east;
    }

    function hideOsmPoiLayers() {
      OSM_POI_LAYERS.forEach(id => {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none');
      });
    }

    function clearDrawerDragStyles() {
      const drawer = document.getElementById('places-drawer');
      if (!drawer) return;
      drawer.classList.remove('dragging');
      drawer.style.transform = '';
    }

    function collapseDrawer() {
      placeDetailOpen = false;
      placesDrawerOpen = false;
      drawerFullScreen = false;
      clearDrawerDragStyles();
      updatePlacesPanel();
      scheduleUrlSync();
    }

    function updatePlacesPanel() {
      const drawer = document.getElementById('places-drawer');
      const listPanel = document.getElementById('places-list-panel');
      const detailPanel = document.getElementById('places-detail-panel');
      const showListBtn = document.getElementById('show-list-btn');
      const showMapBtn = document.getElementById('show-map-btn');

      drawer.classList.remove('open-list', 'open-list-full', 'open-detail', 'collapsed', 'empty');
      clearDrawerDragStyles();

      if (!hasActivePlaceView()) {
        drawer.classList.add('collapsed', 'empty');
        listPanel.classList.remove('places-panel-hidden');
        detailPanel.classList.add('places-panel-hidden');
        showListBtn.classList.add('hidden');
        showMapBtn.classList.add('hidden');
        return;
      }

      if (placeDetailOpen) {
        drawer.classList.add('open-detail');
        listPanel.classList.add('places-panel-hidden');
        detailPanel.classList.remove('places-panel-hidden');
        showListBtn.classList.add('hidden');
        showMapBtn.classList.add('hidden');
      } else if (placesDrawerOpen && drawerFullScreen) {
        drawer.classList.add('open-list-full');
        listPanel.classList.remove('places-panel-hidden');
        detailPanel.classList.add('places-panel-hidden');
        showListBtn.classList.add('hidden');
        showMapBtn.classList.remove('hidden');
      } else if (placesDrawerOpen) {
        drawer.classList.add('open-list');
        listPanel.classList.remove('places-panel-hidden');
        detailPanel.classList.add('places-panel-hidden');
        showListBtn.classList.add('hidden');
        showMapBtn.classList.add('hidden');
      } else {
        drawer.classList.add('collapsed');
        listPanel.classList.remove('places-panel-hidden');
        detailPanel.classList.add('places-panel-hidden');
        showListBtn.classList.remove('hidden');
        showMapBtn.classList.add('hidden');
      }
    }

    function openPlacesList(full = false) {
      placeDetailOpen = false;
      placesDrawerOpen = true;
      drawerFullScreen = Boolean(full);
      clearDrawerDragStyles();
      updatePlacesPanel();
      scheduleUrlSync();
    }

    function setupSearch() {
      const input = document.getElementById('places-search');
      input.addEventListener('input', () => {
        placeSearchQuery = input.value;
        const cat = resolveSearchCategory(placeSearchQuery);
        if (cat) {
          activeFilter = cat;
          placeDetailOpen = false;
          placesDrawerOpen = true;
          drawerFullScreen = false;
        }
        renderChips();
        schedulePlacesFetch(true);
        renderMarkers();
        renderPlacesList();
        scheduleUrlSync();
      });
    }

    function renderChips() {
      const scroll = document.querySelector('.chips-scroll');
      scroll.innerHTML = `<div class="chips-track" id="chips"></div>`;
      const el = document.getElementById('chips');
      el.innerHTML = chips.map(c => `
        <button class="chip ${activeFilter === c.id ? 'active' : ''}" data-id="${c.id}">${c.label}</button>
      `).join('');
      el.querySelectorAll('.chip').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          activeFilter = activeFilter === id ? null : id;
          selectedPlaceId = null;
          placeSearchQuery = '';
          const searchEl = document.getElementById('places-search');
          if (searchEl) searchEl.value = '';
          closePlaceDetail();
          placeDetailOpen = false;
          placesDrawerOpen = Boolean(activeFilter);
          drawerFullScreen = false;
          renderChips();
          schedulePlacesFetch(true);
          renderMarkers();
          renderPlacesList();
          scheduleUrlSync();
        };
      });
    }

    function setupPlacesDrawer() {
      const drawer = document.getElementById('places-drawer');
      const handle = document.getElementById('places-drawer-handle');
      const list = document.getElementById('places-list');
      const DRAG_THRESHOLD = 72;
      let dragStartY = 0;
      let dragDelta = 0;
      let dragging = false;
      let dragActive = false;
      let suppressClick = false;

      const canDrag = () => (placesDrawerOpen || placeDetailOpen) && hasActivePlaceView();

      const resetDrag = () => {
        dragging = false;
        dragActive = false;
        dragDelta = 0;
        drawer.classList.remove('dragging');
        drawer.style.transform = '';
      };

      const finishDrag = () => {
        if (!dragActive) return;
        const delta = dragDelta;
        const wasDragging = dragging;
        resetDrag();

        if (!wasDragging) return;

        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 0);

        if (delta > DRAG_THRESHOLD) {
          collapseDrawer();
          return;
        }
        if (delta < -DRAG_THRESHOLD && placesDrawerOpen && !placeDetailOpen && !drawerFullScreen) {
          drawerFullScreen = true;
          updatePlacesPanel();
          scheduleUrlSync();
        }
      };

      drawer.addEventListener('pointerdown', (e) => {
        if (!canDrag()) return;
        if (e.target.closest('button, a, input')) return;

        const fromHandle = e.target.closest('#places-drawer-handle');
        const fromHeader = e.target.closest('.places-drawer-header');
        const fromDetail = placeDetailOpen && e.target.closest('#places-detail-panel');
        const fromListTop = placesDrawerOpen && !placeDetailOpen
          && e.target.closest('#places-list-panel')
          && (list?.scrollTop || 0) <= 0;

        if (!fromHandle && !fromHeader && !fromDetail && !fromListTop) return;

        dragActive = true;
        dragStartY = e.clientY;
        dragDelta = 0;
      });

      drawer.addEventListener('pointermove', (e) => {
        if (!dragActive) return;
        dragDelta = e.clientY - dragStartY;
        if (!dragging && Math.abs(dragDelta) < 8) return;

        if (!dragging) {
          dragging = true;
          drawer.classList.add('dragging');
          try { drawer.setPointerCapture(e.pointerId); } catch (_) { /* noop */ }
        }

        e.preventDefault();
        if (dragDelta > 0) {
          drawer.style.transform = `translateY(${dragDelta}px)`;
        } else if (placesDrawerOpen && !placeDetailOpen && !drawerFullScreen) {
          drawer.style.transform = `translateY(${dragDelta}px)`;
        }
      });

      drawer.addEventListener('pointerup', finishDrag);
      drawer.addEventListener('pointercancel', finishDrag);

      handle.addEventListener('click', (e) => {
        if (suppressClick) return;
        e.stopPropagation();
        if (placeDetailOpen) {
          collapseDrawer();
          return;
        }
        if (placesDrawerOpen) collapseDrawer();
        else openPlacesList();
      });

      document.getElementById('show-list-btn').onclick = () => openPlacesList();
      document.getElementById('show-map-btn').onclick = () => collapseDrawer();
    }

    function renderPlacesList() {
      const drawer = document.getElementById('places-drawer');
      const hint = document.getElementById('places-drawer-hint');
      const list = document.getElementById('places-list');
      const countEl = document.getElementById('places-count');
      const titleEl = document.getElementById('places-drawer-title');

      const chip = chips.find(c => c.id === activeFilter);

      if (placesLoading && hasActivePlaceView()) {
        titleEl.textContent = chip ? chip.label.trim() : 'Lugares';
        countEl.textContent = '';
        hint.style.display = 'block';
        hint.textContent = 'Cargando lugares en esta zona…';
        list.innerHTML = '';
        updatePlacesPanel();
        return;
      }

      const zoomTooLow = map && map.getZoom() < MIN_POI_ZOOM;

      if (zoomTooLow && hasActivePlaceView()) {
        titleEl.textContent = chip ? chip.label.trim() : 'Lugares';
        countEl.textContent = '';
        hint.style.display = 'block';
        hint.textContent = 'Acércate al mapa para cargar lugares en esta zona';
        list.innerHTML = '';
        updatePlacesPanel();
        return;
      }

      const visible = getVisiblePlaces();
      const showingSearch = Boolean(placeSearchQuery.trim());

      if (!hasActivePlaceView()) {
        titleEl.textContent = 'Lugares';
        countEl.textContent = '';
        hint.style.display = 'block';
        hint.textContent = 'Elige una categoría o busca (ej. pipicans). Pulsa ◎ para usar tu ubicación';
        list.innerHTML = '';
        updatePlacesPanel();
        return;
      }

      if (showingSearch && chip) {
        titleEl.textContent = chip.label.trim();
      } else if (showingSearch) {
        titleEl.textContent = `Resultados «${placeSearchQuery.trim()}»`;
      } else {
        titleEl.textContent = chip ? chip.label.trim() : 'Lugares';
      }
      countEl.textContent = String(visible.length);
      hint.style.display = 'none';

      list.innerHTML = visible.map(place => `
        <li>
          <button type="button" class="places-list-item ${selectedPlaceId === place.id ? 'active' : ''}" data-id="${place.id}">
            <span class="places-list-body">
              <span class="places-list-name">${escapeHtml(place.name)}</span>
              <span class="places-list-meta">${formatDistance(place.distanceKm)}</span>
            </span>
          </button>
        </li>
      `).join('');

      list.querySelectorAll('.places-list-item').forEach(btn => {
        btn.onclick = () => {
          const place = visible.find(p => p.id === btn.dataset.id);
          if (place) selectPlace(place, { fromList: true });
        };
      });

      updatePlacesPanel();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function selectPlace(place, options = {}) {
      selectedPlaceId = place.id;
      placeDetailOpen = true;
      placesDrawerOpen = false;
      drawerFullScreen = false;
      map.flyTo({ center: [place.lng, place.lat], zoom: Math.max(map.getZoom(), 15), duration: 700 });
      renderMarkers();
      renderPlaceDetail(place);
      renderPlacesList();
      scheduleUrlSync();
    }

    function renderPlaceDetail(place) {
      const panel = document.getElementById('places-detail-panel');
      const origin = getDistanceOrigin();
      const dist = formatDistance(distanceKm(origin, place));

      const infoRows = [
        { label: 'Categoría', value: place.categoryLabel },
        { label: userLocation ? 'Distancia desde ti' : 'Distancia', value: dist },
        { label: 'Coordenadas', value: `${place.lat.toFixed(5)}, ${place.lng.toFixed(5)}` },
        ...place.info,
      ];

      const infoHtml = infoRows.length
        ? infoRows.map(row => `
            <div class="place-info-row">
              <div class="place-info-label">${escapeHtml(row.label)}</div>
              <div class="place-info-value">${formatInfoValue(row.label, row.value)}</div>
            </div>
          `).join('')
        : '<p class="place-modal-empty">Sin información adicional en OpenStreetMap.</p>';

      panel.innerHTML = `
        <div class="place-detail" role="dialog" aria-modal="true">
          <div class="place-modal-top">
            <div class="place-modal-emoji">${place.emoji}</div>
            <div class="place-modal-head">
              <h2 class="place-modal-name">${escapeHtml(place.name)}</h2>
              <p class="place-modal-category">${escapeHtml(place.categoryLabel)}</p>
            </div>
            <button type="button" class="place-modal-close" aria-label="Cerrar">×</button>
          </div>
          <div class="place-modal-info">${infoHtml}</div>
          <div class="place-modal-actions">
            <button type="button" class="place-modal-btn primary" id="place-modal-route">Cómo llegar</button>
            <button type="button" class="place-modal-btn secondary" id="place-modal-close-btn">Cerrar</button>
          </div>
        </div>`;

      panel.querySelector('.place-modal-close').onclick = closePlaceDetail;
      panel.querySelector('#place-modal-close-btn').onclick = closePlaceDetail;
      panel.querySelector('#place-modal-route').onclick = () => {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}`, '_blank');
      };

      updatePlacesPanel();
    }

    function formatInfoValue(label, value) {
      const safe = escapeHtml(value);
      if (label === 'Web' || label === 'Wikipedia') {
        const url = value.startsWith('http') ? value : `https://${value}`;
        return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${safe}</a>`;
      }
      return safe;
    }

    function closePlaceDetail() {
      collapseDrawer();
    }

    // Pin Figma: blob rosa 34×40 + cápsula blanca 24×23 con emoji
    const PIN_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="40" viewBox="0 0 34 40" fill="none"><path d="M17 1.5C24.87 1.5 31.5 8.13 31.5 16c0 8.2-12.2 21.5-14.5 21.5S2.5 24.2 2.5 16C2.5 8.13 9.13 1.5 17 1.5z" fill="#F896BF"/></svg>`;

    function pinElement(place, isSelected) {
      const el = document.createElement('div');
      el.className = `pin-wrap${isSelected ? ' selected' : ''}`;
      const labelHtml = place.hasCustomName
        ? `<div class="pin-label" title="${escapeHtml(place.name)}">${escapeHtml(place.name)}</div>`
        : '';
      el.innerHTML = `
        <div class="pin">
          ${PIN_SVG.replace('<svg', '<svg class="pin-shape"')}
          <div class="pin-icon">${place.emoji}</div>
        </div>${labelHtml}`;
      el.onclick = (e) => {
        e.stopPropagation();
        selectPlace(place);
      };
      return el;
    }

    function renderMarkers() {
      markers.forEach(m => m.remove());
      markers.length = 0;
      if (!hasActivePlaceView()) return;

      const visible = getVisiblePlaces();
      if (placesLoading && !visible.length) return;

      let index = 0;
      const batchSize = 80;

      function addBatch() {
        const end = Math.min(index + batchSize, visible.length);
        for (; index < end; index++) {
          const place = visible[index];
          const marker = new maplibregl.Marker({
            element: pinElement(place, selectedPlaceId === place.id),
            anchor: 'bottom-left',
            offset: [27, 0],
          })
            .setLngLat([place.lng, place.lat])
            .addTo(map);
          markers.push(marker);
        }
        if (index < visible.length) requestAnimationFrame(addBatch);
      }

      addBatch();
    }

    initMap();
  </script>
</body>
</html>
